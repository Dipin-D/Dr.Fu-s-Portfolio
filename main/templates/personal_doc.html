<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ story.title }}</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #2b1820;
      background:
        linear-gradient(180deg, rgba(255, 246, 244, 0.98), rgba(255, 250, 247, 0.98)),
        radial-gradient(circle at top left, rgba(216, 93, 123, 0.16), transparent 38%);
      font-family: Georgia, "Times New Roman", "Noto Serif SC", "Songti SC", serif;
    }

    .manuscript {
      width: min(820px, calc(100% - 2rem));
      margin: 1rem auto 3rem;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(155, 41, 71, 0.12);
      border-radius: 8px;
      box-shadow: 0 18px 44px rgba(70, 32, 44, 0.12);
      padding: clamp(1.25rem, 4vw, 3rem);
    }

    header {
      margin-bottom: 2rem;
      padding-bottom: 1.1rem;
      border-bottom: 1px solid rgba(155, 41, 71, 0.16);
    }

    .label {
      color: #9b2947;
      font-family: Arial, sans-serif;
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: #2b1820;
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 400;
      line-height: 1.05;
    }

    .mood {
      max-width: 620px;
      margin: 0.85rem 0 0;
      color: #765866;
      font-family: Arial, sans-serif;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .story-heading {
      color: #8f2742;
      font-size: 1.3rem;
      font-weight: 700;
      margin: 2rem 0 0.85rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(155, 41, 71, 0.13);
    }

    .story-heading:first-of-type {
      border-top: 0;
      margin-top: 0;
      padding-top: 0;
    }

    p {
      margin: 0 0 1rem;
      color: #3d2d34;
      font-size: 1.12rem;
      line-height: 2.05;
    }

    @media (max-width: 520px) {
      .manuscript {
        width: calc(100% - 1rem);
        margin-top: 0.5rem;
        padding: 1rem;
      }

      p {
        font-size: 1rem;
        line-height: 1.9;
      }
    }
  </style>
</head>
<body>
  <article class="manuscript">
    <header>
      <div class="label">{{ story.label }}</div>
      <h1>{{ story.title }}</h1>
      <p class="mood">{{ story.mood }}</p>
    </header>

    {% for paragraph in paragraphs %}
      {% if paragraph.is_heading %}
        <h2 class="story-heading">{{ paragraph.text }}</h2>
      {% else %}
        <p>{{ paragraph.text }}</p>
      {% endif %}
    {% endfor %}
  </article>
</body>
</html>
